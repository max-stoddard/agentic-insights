name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to publish, for example v0.1.1
        required: true
        type: string

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Clear legacy npm auth config
        shell: bash
        run: npm config delete always-auth --location=user || true

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('packages/cli/package.json', 'utf8')).version)")"
          TAG_VERSION="${TAG_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/cli/package.json ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Run packed launcher smoke test
        run: npm run test:pack

      - name: Prepare release notes
        id: release_notes
        shell: bash
        run: |
          RELEASE_NOTES_PATH=".github/release-notes/${TAG_NAME}.md"

          if [ ! -f "$RELEASE_NOTES_PATH" ]; then
            echo "Missing release notes file: $RELEASE_NOTES_PATH"
            exit 1
          fi

          echo "path=$RELEASE_NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish npm package with automation token
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish -w agentic-insights --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Publish npm package with trusted publishing
        if: ${{ env.NPM_TOKEN == '' }}
        run: npm publish -w agentic-insights --access public --provenance

      - name: Prepare GitHub Packages mirror
        run: node ./packages/cli/scripts/prepare-github-package.mjs

      - name: Publish GitHub Packages mirror
        run: npm publish ./packages/cli/.github-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_REGISTRY: https://npm.pkg.github.com

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          body_path: ${{ steps.release_notes.outputs.path }}
          generate_release_notes: true
